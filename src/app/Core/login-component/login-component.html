<div class="min-h-screen bg-gradient-to-br from-gray-50 via-white to-green-50 flex flex-col justify-between p-6">
  <div class="absolute top-10 start-10 text-6xl opacity-20 animate-float">🍓</div>
  <div class="absolute bottom-20 end-10 text-4xl opacity-20 animate-float delay-300">🍃</div>
  
  <main class="grow flex items-center justify-center relative z-10">
    <div class="w-full max-w-md bg-white/80 backdrop-blur-sm p-8 rounded-2xl shadow-xl border border-gray-100 animate-scale-in">
      <div class="text-center mb-8">
        <div class="text-4xl mb-4 animate-pulse-slow">🍓</div>
        <h2 class="text-3xl font-bold gradient-text">{{ 'login.welcome' | translate }}</h2>
        <p class="text-gray-500 mt-2">{{ 'login.subtitle' | translate }}</p>
      </div>
      
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
        <div class="relative group">
          <input type="email" [placeholder]="'login.placeholder.email' | translate" formControlName="email"
                 class="w-full p-4 border-2 border-gray-200 rounded-xl bg-white/50 focus:border-emerald-500 focus:bg-white transition-all duration-300 peer">
          <div class="absolute bottom-0 start-0 w-0 h-0.5 bg-gradient-to-r from-emerald-500 to-green-400 transition-all duration-300 peer-focus:w-full"></div>
        </div>
        
        <div class="relative group">
          <input type="password" [placeholder]="'login.placeholder.password' | translate" formControlName="password"
                 class="w-full p-4 border-2 border-gray-200 rounded-xl bg-white/50 focus:border-emerald-500 focus:bg-white transition-all duration-300 peer">
          <div class="absolute bottom-0 start-0 w-0 h-0.5 bg-gradient-to-r from-emerald-500 to-green-400 transition-all duration-300 peer-focus:w-full"></div>
        </div>
        
         <div class="flex justify-end">
           <a routerLink="/forgot-password" class="text-sm text-emerald-600 hover:text-emerald-700 transition-colors">{{ 'login.forgotPassword' | translate }}</a>
         </div>
        
        <button type="submit" 
                [disabled]="loginForm.invalid"
                class="w-full btn-primary bg-gradient-to-r from-[#10b981] to-emerald-600 text-white py-4 rounded-xl font-semibold hover:shadow-lg hover:shadow-emerald-500/30 transition-all duration-300 transform hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none">
          {{ 'login.btn.signIn' | translate }}
        </button>
      </form>
 
      <p class="text-center text-sm mt-8 text-gray-600">
        {{ 'login.signup.prompt' | translate }}
        <a routerLink="/register" class="text-emerald-600 font-bold hover:text-emerald-700 transition-colors relative after:content-[''] after:absolute after:bottom-0 after:start-0 after:w-0 after:h-0.5 after:bg-emerald-600 after:transition-all after:duration-300 hover:after:w-full">
          {{ 'login.btn.signUp' | translate }}
        </a>
      </p>
    </div>
  </main>

  <footer class="text-sm text-gray-500 flex items-center justify-center gap-2 animate-fade-in">
    <div class="w-6 h-6 bg-gradient-to-br from-[#0e4d3a] to-emerald-500 rounded-full text-white flex items-center justify-center text-xs font-bold">B</div>
    <p>{{ 'footer.copyright' | translate }}</p>
  </footer>
</div>
